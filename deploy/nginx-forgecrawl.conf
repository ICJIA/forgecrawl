# /etc/nginx/sites-available/forgecrawl
# Reverse proxy for ForgeCrawl API only (/api routes)
#
# The marketing site is on Netlify (forgecrawl.com).
# This config handles api.forgecrawl.com → Node app on port 5150.
#
# Setup:
#   sudo cp deploy/nginx-forgecrawl.conf /etc/nginx/sites-available/forgecrawl
#   sudo ln -s /etc/nginx/sites-available/forgecrawl /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d api.forgecrawl.com

server {
    listen 80;
    listen [::]:80;
    server_name api.forgecrawl.com;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.forgecrawl.com;

    # ── SSL (certbot will populate these automatically) ─────────────────
    # ssl_certificate /etc/letsencrypt/live/api.forgecrawl.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.forgecrawl.com/privkey.pem;

    # ── TLS hardening ──────────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # OCSP stapling (uncomment after certbot provisions certs)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /etc/letsencrypt/live/api.forgecrawl.com/chain.pem;

    # ── Security headers (defense-in-depth, supplements app-level) ─────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Request limits ─────────────────────────────────────────────────
    client_max_body_size 1m;

    # ── API proxy (/api) ───────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:5150;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — scraping can take up to 30s
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # ── Health check (no auth, no logging) ─────────────────────────────
    location = /api/health {
        proxy_pass http://127.0.0.1:5150;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # ── Block everything else ──────────────────────────────────────────
    location / {
        return 404;
    }
}
